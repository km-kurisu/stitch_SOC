name: Electron Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────
  # 1. BUILD PYTHON BACKEND → standalone .exe
  # ─────────────────────────────────────────────
  build-python:
    name: Build Python Backend (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name backend `
            --distpath backend-dist `
            backend/main.py
        shell: pwsh

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: python-backend-win
          path: backend-dist/backend.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # 2. BUILD NEXT.JS + ELECTRON → installer
  # ─────────────────────────────────────────────
  build-electron:
    name: Build Electron App (Windows x64)
    runs-on: windows-latest
    needs: build-python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Next.js frontend
        run: npm run build
        working-directory: frontend
        env:
          NODE_ENV: production

      - name: Download Python backend binary
        uses: actions/download-artifact@v4
        with:
          name: python-backend-win
          path: electron/resources/bin/

      - name: Extract version from tag
        id: get_version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Package Electron app
        run: npm run electron:build -- --win --x64
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-installer-win
          path: |
            electron/dist/*.exe
            electron/dist/*.msi
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # 3. GITHUB RELEASE
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-electron
    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: electron-installer-win
          path: release-assets/

      - name: List release assets
        run: find release-assets -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
